<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡塞尔学院 · 录取通知书</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --gold: #bc984c;
      --gold-light: #d4b36a;
      --gold-dark: #8a7040;
      --dark: #141423;
      --dark-soft: #1e1e35;
      --red-seal: #b43333;
      --paper: #f5f0e6;
      --text-light: #6a6a7a;
      --accent-glow: rgba(188, 152, 76, 0.15);
    }
    body {
      font-family: 'Noto Serif SC', serif;
      background: linear-gradient(135deg, #0c0c1a 0%, #1a1a30 50%, #0c0c1a 100%);
      color: var(--paper);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* Nav bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(20,20,35,0.9);
      border-bottom: 1px solid rgba(188,152,76,0.2);
      flex-shrink: 0;
    }
    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .top-bar .brand {
      font-size: 1rem;
      font-weight: 700;
      color: var(--gold-light);
      letter-spacing: 0.15em;
    }
    .top-bar .brand small {
      font-weight: 400;
      font-size: 0.75rem;
      color: var(--text-light);
      letter-spacing: 0;
    }
    .top-bar-actions {
      display: flex;
      gap: 0.8rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.25rem;
      border-radius: 6px;
      font-family: 'Noto Serif SC', serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      border: none;
    }
    .btn-back {
      background: transparent;
      border: 1px solid rgba(188,152,76,0.3);
      color: var(--gold);
    }
    .btn-back:hover {
      background: rgba(188,152,76,0.08);
      border-color: var(--gold);
    }
    .btn-download {
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: var(--dark);
    }
    .btn-download:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px var(--accent-glow);
    }
    /* Main viewer area */
    .viewer {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem;
      overflow: auto;
    }
    .pdf-frame {
      width: 100%;
      max-width: 800px;
      flex: 1;
      min-height: 70vh;
      border: 1px solid rgba(188,152,76,0.2);
      border-radius: 8px;
      background: #f5f0e6;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
      overflow: hidden;
    }
    .pdf-frame embed {
      width: 100%;
      height: 100%;
      min-height: 70vh;
      border: none;
    }
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 4rem 2rem;
      color: var(--text-light);
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(188,152,76,0.15);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Error state */
    .error-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 4rem 2rem;
      text-align: center;
    }
    .error-state .err-icon {
      font-size: 3rem;
      color: var(--red-seal);
    }
    .error-state h2 {
      color: var(--gold-light);
      font-size: 1.2rem;
    }
    .error-state p {
      color: var(--text-light);
      font-size: 0.85rem;
      max-width: 400px;
    }
    /* Footer */
    .viewer-footer {
      flex-shrink: 0;
      text-align: center;
      padding: 1rem;
      color: var(--text-light);
      font-size: 0.75rem;
      border-top: 1px solid rgba(188,152,76,0.1);
    }
    @media (max-width: 540px) {
      .top-bar { flex-direction: column; gap: 0.8rem; padding: 0.8rem 1rem; }
      .pdf-frame { border-radius: 0; border-left: none; border-right: none; }
      .viewer { padding: 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-left">
      <span class="brand">卡塞尔学院 <small>· 录取通知书</small></span>
    </div>
    <div class="top-bar-actions">
      <a href="/" class="btn btn-back">⟳ 返回重填</a>
      <a id="downloadBtn" class="btn btn-download">📜 下载 PDF</a>
    </div>
  </div>

  <div class="viewer">
    <div id="loadingState" class="loading-state">
      <div class="loading-spinner"></div>
      <p>正在加载录取通知书…</p>
    </div>
    <div id="errorState" class="error-state">
      <div class="err-icon">⚠</div>
      <h2>通知书加载失败</h2>
      <p>该通知书的下载链接可能已过期，请返回重填。</p>
      <a href="/" class="btn btn-back">⟳ 返回重填</a>
    </div>
    <div id="pdfFrame" class="pdf-frame" style="display:none">
      <embed id="pdfEmbed" type="application/pdf">
    </div>
  </div>

  <div class="viewer-footer">
    卡塞尔学院 · 秘党长老会 · 执行部 — 本通知书仅供娱乐，源自江南《龙族》系列
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const loading = document.getElementById('loadingState');
    const errorState = document.getElementById('errorState');
    const pdfFrame = document.getElementById('pdfFrame');
    const pdfEmbed = document.getElementById('pdfEmbed');
    const downloadBtn = document.getElementById('downloadBtn');

    if (!token) {
      loading.style.display = 'none';
      errorState.style.display = 'flex';
      return;
    }

    const pdfUrl = '/pdf/' + token;
    pdfEmbed.src = pdfUrl;
    downloadBtn.href = pdfUrl;

    // Check if PDF loads successfully
    pdfEmbed.onload = () => {
      loading.style.display = 'none';
      pdfFrame.style.display = 'block';
    };
    pdfEmbed.onerror = () => {
      loading.style.display = 'none';
      errorState.style.display = 'flex';
    };

    // Also fetch to check if it returns 404
    fetch(pdfUrl, { method: 'HEAD' })
      .then(r => {
        if (!r.ok) {
          loading.style.display = 'none';
          errorState.style.display = 'flex';
          pdfFrame.style.display = 'none';
        }
      })
      .catch(() => {
        // ignore, embed might work anyway
      });
  </script>
</body>
</html>
